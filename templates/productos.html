{% extends "base.html" %}

{% block content %}
<section class="productos-container">
    {% for producto in productos %}
        <div class="card">
            <img src="{{ url_for('static', filename='img/' ~ producto.imagen) }}" alt="{{ producto.nombre }}">
            <h3>{{ producto.nombre }}</h3>
            <p>{{ producto.descripcion }}</p>
            <p class="precio">$ {{ producto.precio }}</p>
            <button class="btn-agregar" 
                    data-id="{{ producto.id }}" 
                    data-nombre="{{ producto.nombre }}" 
                    data-precio="{{ producto.precio }}">
                Añadir al carrito
            </button>
        </div>
    {% endfor %}
</section>

<!-- Botón flotante del carrito -->
<button id="btn-ver-carrito" class="btn-carrito">🛒 Carrito (<span id="cantidad-carrito">0</span>)</button>

<!-- Panel del carrito -->
<div id="carrito-panel" class="carrito-panel">
    <h4>Carrito</h4>
    <ul id="lista-carrito"></ul>
    <p>Total: $<span id="total-carrito">0</span></p>
    <button onclick="guardarCarrito()">Guardar en carrito</button>
    <button onclick="vaciarCarrito()">Vaciar carrito</button>
</div>

<script>
let carrito = [];

// Mostrar/ocultar carrito
const btnCarrito = document.getElementById('btn-ver-carrito');
const panelCarrito = document.getElementById('carrito-panel');

btnCarrito.addEventListener('click', () => {
    panelCarrito.style.display = panelCarrito.style.display === 'block' ? 'none' : 'block';
});

// Función para renderizar el carrito
function renderCarrito() {
    const lista = document.getElementById('lista-carrito');
    lista.innerHTML = '';
    let total = 0;
    let cantidadTotal = 0;
    carrito.forEach(item => {
                lista.innerHTML += `<li>${item.nombre} x${item.cantidad} - $${(item.precio * item.cantidad).toFixed(2)} 
        <a href="#" onclick="eliminarProducto(${item.id})" style="color:red;">🗑️</a></li>`;
        total += item.precio * item.cantidad;
        cantidadTotal += item.cantidad;

    });
    document.getElementById('total-carrito').innerText = total.toFixed(2);
    document.getElementById('cantidad-carrito').innerText = cantidadTotal;
}

// Agregar productos al carrito flotante
document.querySelectorAll('.btn-agregar').forEach(btn => {
    btn.addEventListener('click', () => {
        const id = parseInt(btn.getAttribute('data-id'));
        const nombre = btn.getAttribute('data-nombre');
        const precio = parseFloat(btn.getAttribute('data-precio'));

        const existente = carrito.find(p => p.id === id);
        if(existente) {
            existente.cantidad += 1;
        } else {
            carrito.push({id, nombre, precio, cantidad: 1});
        }

        renderCarrito();
    });
});

// Guardar carrito en session (backend)
function guardarCarrito() {
    fetch('/guardar_carrito', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(carrito)
    })
    .then(response => {
        if(response.ok) {
            alert('Carrito guardado correctamente!');
        } else {
            alert('Error al guardar el carrito.');
        }
    });
}

// Vaciar carrito flotante
function vaciarCarrito() {
    carrito = [];
    renderCarrito();
}
</script>
{% endblock %}
